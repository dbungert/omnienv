repos:
  # more details in https://github.com/TekWizely/pre-commit-golang/blob/master/sample-config.yaml
- repo: https://github.com/tekwizely/pre-commit-golang
  rev: v1.0.0-rc.1
  hooks:
  - id: go-build-repo-mod
  - id: go-mod-tidy-repo
  - id: go-test-repo-mod
  # - id: go-sec-repo-mod
  - id: go-staticcheck-repo-mod
  - id: go-fmt
  - id: golangci-lint-mod
